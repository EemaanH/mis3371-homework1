<html lang="en">
<head>
<meta charset="utf-8">
<title>Patient Registration</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<!--HEADER -->
  <div id="header">
    
  <img
    
  <h1>HealthIsWealth Medical</h1>
  
</div>

<script>
  const
</script>

<!--FORM SECTION -->
  <div id="main">
    <form action="thankyou.html">

      <table>

  <!--NAME ROW -->
        
        <tr>
        <td align="Right">
          <label for="firstname">First NAME</label>
        </td>
        <td>
           <input type="text" size="25" maxlength="30" 
            id="firstname" name="firstname"
            placeholder="(John/Jane)"
            required>
        </td>

        <td align="Right">
          <label for="middleinitial">MI</label>
        </td>
        <td>
           <input type="text" size="1" maxlength="1" 
            id="middleinitial" name="middleinitial"> 
        </td>

        <td align="Right">  
          <label for="lastname">Last Name</label>
        </td>
        <td>
           <input type="text" size="25" maxlength="30" 
            id="lastname" name="lastname"
            placeholder="Doe"
            required>
        </td>
        </tr>
<!--DOB & SSN -->
        <tr>
          <td align= "Right">
            <label for="dob">Date of Birth</label>
          </td>
          <td>
            <input type="text" size="10" maxlength="10" 
            id="dob" name="dob" 
            placeholder="MM/DD/YYYY"
            pattern="\d{2}/\d{2}/\d{4}"
            required>
           </td>
          
          <td align="right">
          <label for="ssn">Social Security Number</label>
          </td>
          <td>
          <input type="password" size="11" maxlength="11" 
          id="ssn" name="ssn" 
          placeholder="XXX-XX-XXXX"
          pattern="\d{3}-\d{2}-\d{4}" 
          required>
          </td>
         </tr>

        <!--ADDRESS SECTION -->
    
        <tr>
         <td align="right">Address Line 1:</td>
          <td colspan="5">
            <input type="text" 
             name="address1" 
             maxlength="30" 
             size="40"
             placeholder="123 Main Street"
             required>
          </td>
          </tr>

        <tr>
         <td align="right">Address Line 2:</td>
          <td colspan="5">
            <input type="text"
              name="address2"
              maxlength="30"
              size="40"
              placeholder="Apartment, suite, etc.">
          </td>
        </tr>

        <tr>
          <td align="right">City:</td>
          <td>
            <input type="text"
              name="city"
              maxlength="30"
              placeholder="Houston"
              required>
          </td>

          <td align="right">State:</td>
          <td>
            <select name="state" required>
              <option value="">Select</option>
              <option>AL</option>
              <option>AK</option>
              <option>AZ</option>
              <option>AR</option>
              <option>AS</option>
              <option>CA</option>
              <option>CO</option>
              <option>CT</option>
              <option>DE</option>
              <option>DC</option>
              <option>FL</option>
              <option>GA</option>
              <option>GU</option>
              <option>HI</option>
              <option>ID</option>
              <option>IL</option>
              <option>IN</option>
              <option>IA</option>
              <option>KS</option>
              <option>KY</option>
              <option>LA</option>
              <option>ME</option>
              <option>MD</option>
              <option>MA</option>
              <option>MI</option>
              <option>MN</option>
              <option>MS</option>
              <option>MO</option>
              <option>MT</option>
              <option>NE</option>
              <option>NV</option>
              <option>NH</option>
              <option>NJ</option>
              <option>NM</option>
              <option>NY</option>
              <option>NC</option>
              <option>ND</option>
              <option>MP</option>
              <option>OH</option>
              <option>OK</option>
              <option>OR</option>
              <option>PA</option>
              <option>PR</option>
              <option>RI</option>
              <option>SC</option>
              <option>SD</option>
              <option>TN</option>
              <option>TX</option>
              <option>TT</option>
              <option>UT</option>
              <option>VT</option>
              <option>VA</option>
              <option>VI</option>
              <option>WA</option>
              <option>WV</option>
              <option>WI</option>
              <option>WY</option>
              
            </select>
          </td>

          <td align="right">Zip:</td>
          <td>
            <input type="text"
              name="zip"
              maxlength="10"
              placeholder="77002"
              pattern="[0-9\-]{5,10}"
              required>
          </td>
        </tr>
        
      </table>
    </form>
  </div>
